<!DOCTYPE html>
<!--
  index.html — MAIN page. Just the monogram.
  The site is now MULTI-PAGE: each menu item is its own .html file.
  Links between pages are plain <a href="page.html"> — the browser
  loads a new document each time. Simplest possible architecture.
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Midya Golabi — interior designer. Portfolio of residential interior design projects: warm, minimal, functional spaces." />
  <title>Midya Golabi — Interior Design</title>

  <!-- Canonical URL: tells Google the "official" address of this page,
       so github.io copies or http/https variants don't compete with it. -->
  <link rel="canonical" href="https://www.midyagolabi.com/" />

  <!-- Open Graph tags: control the preview card when the link is shared
       (WhatsApp, Telegram, Instagram DM, Facebook, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Midya Golabi — Interior Design" />
  <meta property="og:description" content="Portfolio of residential interior design projects." />
  <meta property="og:url" content="https://www.midyagolabi.com/" />
  <meta property="og:image" content="https://www.midyagolabi.com/images/tiny-house-lounge.jpg" />

  <!-- Structured data (JSON-LD): machine-readable card telling Google
       exactly who this site is about — helps ranking for name searches. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Midya Golabi",
    "jobTitle": "Interior Designer",
    "url": "https://www.midyagolabi.com/",
    "email": "mailto:midyagolabi.arc@gmail.com"
  }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- This header block is copy-pasted identically on every page.
       (Plain HTML has no "include" — frameworks fix that later.) -->
  <header class="site-header">
    <button class="menu-toggle" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contacts</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1 class="monogram" aria-label="Midya Golabi">GM</h1>
      <p class="name">Midya Golabi</p>
      <p class="tagline">Interior Design</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
